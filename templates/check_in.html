<h1>Daily Check-In</h1>

<form method="POST">

  <label>How are you feeling today?</label><br>

  <select name="mood">
    <option value="10">Very productive</option>
    <option value="8">Focused</option>
    <option value="6">Okay</option>
    <option value="4">Low energy</option>
    <option value="2">Very tired</option>
    <option value="0">Despondent</option>
  </select>

  <br><br>
  <button type="submit">Submit</button>

</form>
